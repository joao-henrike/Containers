# ============================================================================
# Professional Forensics Container - docker-compose.yml v2.1.0-FINAL
# ============================================================================
# CHANGELOG desta versão:
#   - FIX: Tag 'version:' removida (obsoleta no Docker Compose V2, causava warning)
#   - FIX: Bloco 'deploy > resources' com limites estáticos (cpus/memory) removido
#          O container agora escala dinamicamente com todos os recursos do host
#   - FIX: Volume de chaves apontado para /opt/forensics/quantum-keys (local exato
#          onde o script ML-DSA-65 busca as chaves para liberar acesso root)
#   - FEAT: privileged: true mantido (necessário para tcpdump/tshark e chattr +a)
#   - FEAT: hostname e container_name definidos para clareza de identificação
# ============================================================================

services:
  forensics-workstation:
    build:
      context: .
      dockerfile: Dockerfile
    image: forensics-professional:v2.1.0-FINAL
    container_name: forensics-workstation
    hostname: forensics-lab

    # Mantém o container ativo e interativo para uso do shell forense
    stdin_open: true
    tty: true

    # Modo privilegiado é obrigatório para:
    #   - Capturas de pacote avançadas (tcpdump, tshark)
    #   - Montagem de partições via loop device
    #   - Atributos de imutabilidade (chattr +a nos logs de auditoria)
    privileged: true

    # Sem bloco 'deploy > resources' — o container usa os recursos disponíveis
    # dinamicamente, evitando erros em hosts com menos de 8 CPUs ou 16 GB RAM.

    environment:
      - TZ=UTC
      - FORENSICS_VERSION=2.1.0-FINAL
      - FORENSICS_USER=sherlock

    volumes:
      # /evidence: SOMENTE LEITURA — evidências não podem ser alteradas ou deletadas
      - ./evidence:/evidence:ro

      # /cases: leitura e escrita — diretório de trabalho do analista
      - ./cases:/cases

      # /logs → /var/log/forensics: audit logs imutáveis (append-only via chattr +a)
      - ./logs:/var/log/forensics

      # /keys → /opt/forensics/quantum-keys: chaves pós-quânticas (ML-DSA-65)
      # Este é o caminho exato que o script de autenticação PQC consulta
      - ./keys:/opt/forensics/quantum-keys

      # /reports: relatórios assinados digitalmente gerados pelo analista
      - ./reports:/reports

      # /config: configurações personalizadas do analista e do sistema
      - ./config:/etc/forensics

    # Política de restart: reinicia automaticamente se o container cair
    restart: unless-stopped

    # Labels de identificação e metadados
    labels:
      - "forensics.version=2.1.0"
      - "forensics.compliance=NIST-SP-800-86"
      - "forensics.crypto=Post-Quantum"
      - "forensics.user=sherlock"
      - "maintainer=joao-henrike"
