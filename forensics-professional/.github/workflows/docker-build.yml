name: Docker Build & Security Scan

on:
  push:
    branches: [ main ]
    paths:
      - 'forensics-professional/**'
  pull_request:
    branches: [ main ]

defaults:
  run:
    working-directory: forensics-professional

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker compose build --no-cache

      - name: Start container
        run: |
          docker compose up -d
          sleep 10

      - name: Health check
        run: |
          docker exec forensics-workstation forensics-health quick-check

      - name: Audit verification
        run: |
          docker exec forensics-workstation forensics-audit verify

      - name: Module list test
        run: |
          docker exec forensics-workstation forensics-modules list

      - name: Run validation script
        run: |
          docker exec forensics-workstation \
            /opt/forensics/scripts/validation-scripts/FBI_VALIDATION_CLEAN.sh

      - name: Security scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'forensics-professional:v2.1.0-FINAL'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Stop container
        if: always()
        run: docker compose down
